<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.A.R.V.I.S</title>
    <script type="module" crossorigin src="/assets/index-BU7PZSx1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-tsl4WyFv.css">
  </head>
  <body>
    <!-- Three.js renders here -->
    <canvas id="orb-canvas"></canvas>

    <!-- Status text above the label -->
    <div id="status-text"></div>

    <!-- Persistent label at the very bottom -->
    <div id="assistant-label">J.A.R.V.I.S</div>

    <!-- Connection indicator — top-right -->
    <div id="connection-badge">
      <span id="connection-dot"></span>
      <span id="connection-label">connexion</span>
    </div>

    <!-- Mute toggle -->
    <button id="mute-button" type="button" aria-pressed="false" aria-label="Couper le son" title="Couper le son">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14 5 9.8 8.5H6a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h3.8L14 19a1 1 0 0 0 1.6-.8V5.8A1 1 0 0 0 14 5Z" fill="currentColor"/>
        <path d="M18.5 9.5 21 12l-2.5 2.5M21 9.5 18.5 12 21 14.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button id="dashboard-button" type="button" aria-pressed="false" aria-label="Ouvrir le dashboard" title="Dashboard">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="4" width="7" height="7" rx="1.5" fill="currentColor"/>
        <rect x="13" y="4" width="7" height="4" rx="1.5" fill="currentColor"/>
        <rect x="13" y="10" width="7" height="10" rx="1.5" fill="currentColor"/>
        <rect x="4" y="13" width="7" height="7" rx="1.5" fill="currentColor"/>
      </svg>
    </button>

    <!-- Voice trigger -->
    <button id="mic-button" type="button" aria-pressed="false" aria-label="Parler a JARVIS" title="Parler a JARVIS">
      <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor"/>
        <path d="M5 11a7 7 0 0 0 14 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 18v3M8.5 21h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor"/>
      </svg>
    </button>

    <!-- Transcript / answer -->
    <div id="conversation-panel" aria-live="polite">
      <div id="user-text" class="speech-bubble user-bubble"></div>
      <div id="jarvis-text" class="speech-bubble jarvis-bubble"></div>
    </div>

    <section id="music-dock" class="music-dock is-hidden" aria-live="polite">
      <div class="music-dock-head">
        <div>
          <div class="music-dock-kicker">lecture web</div>
          <div id="music-status" class="music-dock-status">Aucune musique chargee.</div>
        </div>
        <button id="music-hide-button" type="button" aria-label="Masquer le player">×</button>
      </div>
      <div class="music-dock-search">
        <input id="music-search-input" type="text" placeholder="Exemple : La vie qu'on mene de Ninho" />
        <button id="music-search-button" type="button">Lancer</button>
      </div>
      <div id="music-player-shell" class="music-dock-player is-empty">
        <div id="music-player"></div>
      </div>
      <div class="music-dock-controls">
        <button id="music-play-button" type="button">Lire</button>
        <button id="music-pause-button" type="button">Pause</button>
        <button id="music-stop-button" type="button">Stop</button>
      </div>
    </section>

    <!-- Error / info toast -->
    <div id="error-text"></div>

    <aside id="dashboard-panel" aria-hidden="true">
      <div id="dashboard-card">
        <div id="dashboard-head">
          <div id="dashboard-head-copy">
            <div id="dashboard-kicker">control center</div>
            <h2 id="dashboard-title">Dashboard Jarvis</h2>
            <p id="dashboard-subtitle">Reglages, integrations et acces reunis dans une interface plus nette.</p>
          </div>
          <button id="dashboard-close" type="button" aria-label="Fermer le dashboard">×</button>
        </div>

        <div id="dashboard-meta"></div>
        <div id="dashboard-summary"></div>
        <div id="dashboard-auth-status"></div>
        <div id="dashboard-config-flags"></div>
        <section id="dashboard-debug-panel" class="dashboard-debug-panel">
          <div class="dashboard-debug-head">
            <div>
              <h3>Debug console</h3>
              <p>Affiche les derniers logs Jarvis du serveur pour suivre ce qu'il fait en direct.</p>
            </div>
            <button id="dashboard-debug-toggle" type="button" aria-pressed="false">Activer le debug</button>
          </div>
          <pre id="dashboard-debug-output">Mode debug inactif.</pre>
        </section>
        <form id="dashboard-form">
          <div id="dashboard-fields"></div>
          <div id="dashboard-actions">
            <button id="dashboard-login" type="button">Connexion Discord</button>
            <button id="dashboard-logout" type="button">Deconnexion</button>
            <button id="dashboard-save" type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </aside>

  </body>
</html>
