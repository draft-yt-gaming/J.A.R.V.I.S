<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>J.A.R.V.I.S</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">J.A.R.V.I.S</p>
          <h1>Page active</h1>
        </div>
        <button id="summarize-button" type="button">Resumer</button>
      </header>

      <label class="server-field">
        <span>Serveur</span>
        <input id="server-url" type="url" spellcheck="false" />
      </label>

      <section class="page-meta">
        <strong id="page-title">Onglet Chrome</strong>
        <span id="page-url"></span>
      </section>

      <pre id="result" class="result">Clique sur Resumer pour envoyer la page actuelle a Jarvis.</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
